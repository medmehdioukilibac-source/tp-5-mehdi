name: Tests & Quality
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependences
        run: pip install -r requirements.txt

      - name: Installer Flake8
        run: pip install flake8
      - name: Lancer le linter
        run: flake8 app --count --select=E9,F63,F7,F82,F841 --show-source --statistics
        run: flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
        run: flake8 tests --count --max-line-length=127 --statistics
      - name: Lancer les tests
        run: python -m pytest -v --cov=app